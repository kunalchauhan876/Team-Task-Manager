kind = "web"
previewPath = "/"
title = "Project Manager"
version = "1.0.0"
id = "artifacts/project-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18497

[services.development]
run = "pnpm --filter @workspace/project-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/project-manager", "run", "build" ]
publicDir = "artifacts/project-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18497"
BASE_PATH = "/"
